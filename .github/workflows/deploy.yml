name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # pregenerate hook builds app/assets/data/forms.json from public/forms/*
      - run: npm run generate
        env:
          # Project site lives under /<repo>/ — prefix all asset + form links.
          NUXT_APP_BASE_URL: /thai-form-fill/
      # Pages serves assets with max-age=600 and the form's lib/*.js|css have no content hash, so a
      # deploy's JS/CSS would be masked by the browser cache for ~10 min. Append the commit SHA to the
      # lib references in each built form so every deploy busts the cache and updates reach users at once.
      - name: Cache-bust form lib assets
        run: |
          SHA="${GITHUB_SHA::8}"
          find .output/public/forms -name index.html -print0 | xargs -0 sed -i \
            -e "s#\(\.\./\.\./lib/[A-Za-z0-9_-]*\.js\)\"#\1?v=$SHA\"#g" \
            -e "s#\(\.\./\.\./lib/[A-Za-z0-9_-]*\.css\)\"#\1?v=$SHA\"#g"
          echo "Stamped lib assets with v=$SHA:"; grep -o 'lib/[A-Za-z0-9_.-]*?v=[a-f0-9]*' .output/public/forms/50bis/index.html | sort -u
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
