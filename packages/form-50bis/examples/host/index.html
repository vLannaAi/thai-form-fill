<!doctype html>
<html>
<head><meta charset="utf-8"><title>Host app — Form50Bis embed smoke</title></head>
<body>
<h1>Host page (should NOT be affected by the embedded form's styles)</h1>
<div id="app"></div>
<script type="module">
  import { createApp, h, ref } from 'vue';
  import Form50Bis from '../../src/index.js';

  const data = ref({
    certificate: { bookNumber: '1', number: '123' },
    payer: { taxId: '0105556012345', name: 'Lanna Tech Co., Ltd.', address: '123 Sukhumvit Rd., Bangkok 10110' },
    payee: { taxId: '1100987654321', name: 'Mr. Somchai Jaidee', address: '456 Moo 7, Chiang Mai 50200' },
    withholdingReturn: { formType: 'pnd1a', sequenceNumber: '1' },
    income: [{ datePaid: '31 Dec 2026', amountPaid: 600000, taxWithheld: 30000 }],
    funds: { socialSecurity: 9000 },
    taxPaymentCondition: { condition: 'withheldFromPayment' },
    issueDate: { day: '31', month: 'December', yearBE: '2569' },
  });
  const form = ref(null);
  createApp({
    render: () => h(Form50Bis, {
      ref: form,
      modelValue: data.value,
      language: 'en',
      'onUpdate:modelValue': (v) => { window.__lastData = v; },
    }),
  }).mount('#app');

  window.__getResult = () => form.value.getResult();
  window.__print = () => form.value.print();
  window.__ready = true;
</script>
</body>
</html>
